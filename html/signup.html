<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foodie - Create Account</title>
  <link rel="icon" href="../imgs/favicon.webp" type="image/webp" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/signUp.css" />
  <link rel="stylesheet" href="../css/modern-design.css" />
  <link rel="stylesheet" href="../css/cursor.css" />
  <script>
    // Immediately apply saved theme
    (function () {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <!-- Google Sign-In Library -->
  <script src="https://accounts.google.com/gsi/client" onload="onGoogleLibraryLoad()" async defer></script>
</head>

<body class="signup-page">
  <a href="./index.html" class="back-home-btn">
    <i class="fa-solid fa-arrow-left"></i>
  </a>

  <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle Dark Mode">
    <i class="fa-solid fa-moon"></i>
  </button>

  <main class="auth-split-container">
    <!-- Left Section: Illustration -->
    <section id="heroSection" class="auth-hero">
      <div class="hero-inner">
        <div class="auth-emoji" id="heroEmoji">
            <img src="../imgs/pancakes.webp" alt="Food" style="width: 150px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));">
        </div>
        <h1 class="auth-logo">Join Foodie.</h1>
        <p class="auth-tagline" id="heroTagline">Fresh rolls, happy souls!</p>
      </div>
      
      <!-- Particle effects or background elements -->
      <div class="auth-decoration deco-1"></div>
      <div class="auth-decoration deco-2"></div>
    </section>

    <!-- Right Section: Form -->
    <section class="auth-form-container">
      <div class="auth-form-box">
        <div id="signupForm" class="auth-box active">
          <div class="auth-header">
            <h2>Create Account</h2>
            <p>Join us today and discover amazing food near you</p>
          </div>

          <form onsubmit="handleSignup(event)">
            <div class="input-group">
              <label for="signupName">Full Name</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-user field-icon"></i>
                <input type="text" id="signupName" placeholder="John Doe" required 
                       pattern="[a-zA-Z\s]*" oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '');" />
              </div>
            </div>

            <div class="input-group">
              <label for="signupEmail">Email Address</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-envelope field-icon"></i>
                <input type="email" id="signupEmail" placeholder="your@email.com" required 
                       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" 
                       oninput="this.value = this.value.toLowerCase().replace(/[^a-z0-9@.]/g, '');" />
              </div>
            </div>

            <div class="input-group">
              <label for="signupPhone">Phone Number</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-phone field-icon"></i>
                <input type="tel" id="signupPhone" placeholder="0000000000" required 
                       pattern="[0-9]*" oninput="this.value = this.value.replace(/[^0-9]/g, '');" />
              </div>
            </div>

            <div class="input-group">
              <label for="signupPassword">Password</label>
              <div class="input-wrapper">
                <i class="fa-solid fa-lock field-icon"></i>
                <input type="password" id="signupPassword" placeholder="Create strong password" required 
                       pattern="(?=.*[A-Z])(?=.*[!@#$%^&*(),.?\&quot;:{}|<>]).{6,}" 
                       title="Must contain at least one uppercase letter, one special character, and be at least 6 characters long" />
                <button type="button" class="eye-btn" onclick="togglePassword('signupPassword')">
                  <i class="fa-solid fa-eye"></i>
                </button>
              </div>
            </div>

            <div class="form-options mb-1">
              <label class="checkbox-container">
                <input type="checkbox" required>
                <span class="checkmark"></span>
                I agree to the <a href="./terms-of-service.html" target="_blank" class="accent-link">Terms & Conditions</a>
              </label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
          </form>

          <div class="auth-divider"><span>OR SIGN UP WITH</span></div>

          <div class="auth-social">
            <div id="signupGoogleBtn"></div>
          </div>

          <p class="auth-footer">
            Already have an account? <a href="./login.html" class="accent-link">Login here</a>
          </p>
        </div>
      </div>
    </section>
  </main>

  <style>
    .mb-1 { margin-bottom: 1.5rem !important; }
  </style>

  <script src="../js/auth.js"></script>
    <script src="../js/floating-feedback.js"></script>
</body>
</html>
